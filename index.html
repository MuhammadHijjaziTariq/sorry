<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sorry, Ayesha</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Pure Pink Gradient - No dark tones */
            background: linear-gradient(135deg, #ffafcc 0%, #ffc2d1 50%, #fb6f92 100%);
            font-family: 'Comic Sans MS', 'Arial', sans-serif; /* Soft and friendly */
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 85%;
            padding: 40px;
            /* Bright White/Pink Glass */
            background: rgba(255, 255, 255, 0.7);
            border-radius: 40px;
            backdrop-filter: blur(10px);
            border: 4px solid #ff85a2;
            box-shadow: 0 15px 35px rgba(251, 111, 146, 0.4);
            animation: bounceIn 1s ease-out;
        }

        .gif-wrapper {
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 30px;
            border: 6px solid #ffb3c1;
            box-shadow: 0 8px 15px rgba(255, 133, 162, 0.3);
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #ff477e; /* Very Pinky Pink */
            text-shadow: 2px 2px 0px #ffffff;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #c9184a; /* Darker Pink for readability */
            font-weight: bold;
        }

        .btn {
            padding: 18px 55px;
            font-size: 1.3rem;
            font-weight: bold;
            background: #ff5c8a;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 0px #c9184a; /* Cute 3D effect */
        }

        .btn:hover {
            transform: translateY(-3px);
            background: #ff7096;
            box-shadow: 0 9px 0px #c9184a;
        }

        .btn:active {
            transform: translateY(3px);
            box-shadow: 0 2px 0px #c9184a;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); opacity: 1; }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: heartFall 4s linear forwards;
            z-index: 10;
        }

        @keyframes heartFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-wrapper">
            <img id="mainGif" src="1.gif" alt="Pleading face">
        </div>
        
        <h1 id="title">I'm So Sorry!</h1>
        <p id="message">
            I hate that your shoulder hurts. 🩹<br>
            I didn't know the bench was bad.<br>
            Forgive me, pretty girl? 💕
        </p>
        
        <button class="btn" id="forgiveBtn" onclick="handleForgiveness()">Yes, I Forgive You! 💖</button>
    </div>

    <script>
        function handleForgiveness() {
            // Change to 2.gif
            const gif = document.getElementById('mainGif');
            gif.src = "2.gif"; 

            document.getElementById('title').innerText = "Yay! I Love You!";
            document.getElementById('message').innerHTML = "I'll be so much more careful!<br>I promise to make you feel better. ❤️";
            
            const btn = document.getElementById('forgiveBtn');
            btn.style.display = "none";

            // Pinkest heart shower ever
            for (let i = 0; i < 60; i++) {
                setTimeout(createHeart, i * 40);
            }
        }

        function createHeart() {
            const hearts = ['💗', '💓', '💞', '🏩', '🍭', '🍓', '🎀'];
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 25 + 20) + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
