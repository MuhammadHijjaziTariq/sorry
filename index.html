<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sorry, Love</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Darker, richer pink/plum gradient */
            background: linear-gradient(135deg, #2d0a1a 0%, #701c45 100%);
            font-family: 'Georgia', serif;
            overflow: hidden;
            color: #fff0f5;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 85%;
            padding: 40px;
            /* Darker glass effect */
            background: rgba(20, 0, 10, 0.6);
            border-radius: 40px;
            backdrop-filter: blur(15px);
            border: 1px solid rgba(214, 51, 132, 0.3);
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
            animation: softFadeIn 1.5s ease-out;
        }

        .gif-wrapper {
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            animation: pulse 3s infinite ease-in-out;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 25px;
            border: 2px solid #ff85a2;
            box-shadow: 0 0 20px rgba(255, 133, 162, 0.4);
            object-fit: contain;
        }

        h1 {
            font-size: 2.4rem;
            margin: 10px 0;
            color: #ff85a2; /* Soft pink contrast */
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ffd1dc;
        }

        .btn {
            padding: 16px 50px;
            font-size: 1.1rem;
            font-weight: bold;
            background: linear-gradient(to right, #d63384, #a31d5d);
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s ease;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(214, 51, 132, 0.4);
            filter: brightness(1.2);
        }

        @keyframes softFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.02); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: heartFall 4s linear forwards;
            z-index: 10;
        }

        @keyframes heartFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-wrapper">
            <img id="mainGif" src="1.gif" alt="Thinking of you">
        </div>
        
        <h1 id="title">I'm so sorry, Babe</h1>
        <p id="message">
            I feel terrible that the bench made your shoulder hurt. 
            I just wanted to sit close to you, but I should have checked if you were okay. 
            Forgive me? 🩹❤️
        </p>
        
        <button class="btn" id="forgiveBtn" onclick="handleForgiveness()">I Forgive You ✨</button>
    </div>

    <script>
        function handleForgiveness() {
            // 1. Swaps the image to 2.gif
            const gif = document.getElementById('mainGif');
            gif.src = "2.gif"; 

            // 2. Update the text to something healing
            document.getElementById('title').innerText = "Thank You, My Love";
            document.getElementById('message').innerHTML = "I'll be extra careful next time! <br> Can I offer a shoulder massage as a refund? ❤️";
            
            // 3. Hide the button
            const btn = document.getElementById('forgiveBtn');
            btn.style.display = "none";

            // 4. Trigger deep pink heart shower
            for (let i = 0; i < 50; i++) {
                setTimeout(createHeart, i * 50);
            }
        }

        function createHeart() {
            const hearts = ['💖', '🌹', '✨', '🩹', '💕'];
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 15) + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
