<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>So Sorry, Ayesha</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            /* Deepest Pink to Hot Pink Gradient */
            background: linear-gradient(135deg, #1a000d 0%, #4d0026 100%);
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            color: #ffffff;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 85%;
            padding: 40px;
            /* Semi-transparent Pink Glass */
            background: rgba(255, 0, 127, 0.1);
            border-radius: 40px;
            backdrop-filter: blur(20px);
            border: 2px solid #ff007f; /* Neon Pink Border */
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.4);
            animation: softFadeIn 1.5s ease-out;
        }

        .gif-wrapper {
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            animation: pulse 2.5s infinite ease-in-out;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 25px;
            border: 3px solid #ff007f;
            box-shadow: 0 0 20px #ff007f;
            object-fit: contain;
        }

        h1 {
            font-size: 2.5rem;
            margin: 10px 0;
            color: #ff007f; /* THE Pink */
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.8);
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #ffb3d9; /* Lighter Pinkish text */
        }

        .btn {
            padding: 16px 50px;
            font-size: 1.2rem;
            font-weight: bold;
            background: #ff007f;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.5);
            text-transform: uppercase;
        }

        .btn:hover {
            transform: scale(1.1);
            background: #ff3399;
            box-shadow: 0 0 25px #ff007f;
        }

        @keyframes softFadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: heartFall 4s linear forwards;
            z-index: 10;
        }

        @keyframes heartFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 0; }
            20% { opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-wrapper">
            <img id="mainGif" src="1.gif" alt="Thinking of you">
        </div>
        
        <h1 id="title">I'm so sorry!</h1>
        <p id="message">
            I feel terrible about your shoulder. 
            I just wanted to be near you but I didn't know it was uncomfortable. 
            Forgive me, my love? 🩹💕
        </p>
        
        <button class="btn" id="forgiveBtn" onclick="handleForgiveness()">Yes, I forgive you! 💖</button>
    </div>

    <script>
        function handleForgiveness() {
            const gif = document.getElementById('mainGif');
            gif.src = "2.gif"; 

            document.getElementById('title').innerText = "Thank You! ❤️";
            document.getElementById('message').innerHTML = "I promise to be more careful with you. <br> I love you so much! ✨";
            
            const btn = document.getElementById('forgiveBtn');
            btn.style.display = "none";

            // Trigger HOT PINK heart shower
            for (let i = 0; i < 60; i++) {
                setTimeout(createHeart, i * 40);
            }
        }

        function createHeart() {
            const hearts = ['💖', '💕', '💗', '💓', '✨', '🩹'];
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
