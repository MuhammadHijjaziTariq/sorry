<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Favorite Person</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: linear-gradient(135deg, #fff5f5 0%, #fed7e2 100%);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            color: #702459;
        }

        .container {
            text-align: center;
            max-width: 450px;
            width: 90%;
            padding: 40px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.7);
            box-shadow: 0 20px 40px rgba(214, 51, 132, 0.1);
            animation: softFadeIn 1.2s ease-out;
        }

        .gif-wrapper {
            width: 100%;
            height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 25px;
            animation: pulse 2s infinite ease-in-out;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 20px;
            border: 5px solid white;
            box-shadow: 0 8px 20px rgba(214, 51, 132, 0.15);
            object-fit: contain;
        }

        h1 {
            font-size: 2.2rem;
            margin: 10px 0;
            color: #d63384;
        }

        p {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
            color: #862e6e;
        }

        .btn {
            padding: 15px 45px;
            font-size: 1.1rem;
            font-weight: bold;
            background-color: #ff85a2;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(255, 133, 162, 0.3);
        }

        .btn:hover {
            background-color: #f76d91;
            transform: scale(1.1);
        }

        @keyframes softFadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.03); }
        }

        .heart-particle {
            position: absolute;
            pointer-events: none;
            animation: heartFall 3.5s linear forwards;
            z-index: 10;
        }

        @keyframes heartFall {
            0% { transform: translateY(-10vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="gif-wrapper">
            <img id="mainGif" src="1.gif" alt="Pleading...">
        </div>
        
        <h1 id="title">I'm Sorry, Babe</h1>
        <p id="message">I really hate it when we're not okay. <br> Can you forgive me?</p>
        
        <button class="btn" id="forgiveBtn" onclick="handleForgiveness()">Forgive me? ✨</button>
    </div>

    <script>
        function handleForgiveness() {
            // 1. Swaps the image to 2.gif
            const gif = document.getElementById('mainGif');
            gif.src = "2.gif"; 

            // 2. Update the text
            document.getElementById('title').innerText = "You're the Best!";
            document.getElementById('message').innerHTML = "I love you so much! <br> Can't wait to see your smile again. ❤️";
            
            // 3. Hide the button so she can focus on the happy GIF
            const btn = document.getElementById('forgiveBtn');
            btn.style.display = "none";

            // 4. Trigger the heart shower
            for (let i = 0; i < 40; i++) {
                setTimeout(createHeart, i * 60);
            }
        }

        function createHeart() {
            const hearts = ['🌸', '💖', '✨', '💝', '💕', '🍓'];
            const heart = document.createElement('div');
            heart.className = 'heart-particle';
            heart.innerText = hearts[Math.floor(Math.random() * hearts.length)];
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.fontSize = (Math.random() * 20 + 20) + 'px';
            
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 4000);
        }
    </script>
</body>
</html>
